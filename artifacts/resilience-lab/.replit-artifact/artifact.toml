kind = "web"
previewPath = "/"
title = "Resilience Lab"
version = "1.0.0"
id = "artifacts/resilience-lab"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22788

[services.development]
run = "pnpm --filter @workspace/resilience-lab run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/resilience-lab", "run", "build" ]
publicDir = "artifacts/resilience-lab/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22788"
BASE_PATH = "/"
